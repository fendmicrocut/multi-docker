#          app-name: multi-docker-app
#          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
#          package: deploy.zip


      # Log in to Azure using a Service Principal or Publish Profile
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy the image directly from Docker Hub to your App Service
      - name: 'Deploy Container to Azure App Service'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'multi-docker-app'
          images: |
            docker.io/fendmicrocut/multi-client-up:latest
            docker.io/fendmicrocut/multi-nginx-up:latest
            docker.io/fendmicrocut/multi-server-up:latest
            docker.io/fendmicrocut/multi-worker-up:latest
